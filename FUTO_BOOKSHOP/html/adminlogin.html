<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUTO Admin Login</title>
  <link rel="stylesheet" href="../css/adminlogin.css">
</head>
<body>
  <div class="container">
    <div class="login-card">
      <div class="logo">
        <a href="index.html">
          <img src="../assets/logo.png" alt="FUTO Logo">
        </a>
      </div>

      <h2>Administrator Portal</h2>
      <p class="subtitle">Sign in with your admin credentials</p>

      <form action="../php/adminphp/admin.php" method="POST">
        <label for="username">Admin Username</label>
        <input type="text" id="username" name="username" placeholder="Enter Username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>

        <button type="submit" class="btn">Login</button>
      </form>
<div class="back-link">
  <p>Not an admin? <a href="login.html">Go back</a></p>
</div>

    </div>
  </div>
</body>
</html>
