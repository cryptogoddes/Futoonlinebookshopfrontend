<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUTO Online Bookshop Login</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div class="container">
    <div class="login-card">
      <div class="logo">
        <a href="index.html">
          <img src="../assets/logo.png" alt="FUTO Logo">
        </a>
      </div>

      <h2>Welcome to FUTO Bookshop</h2>
      <p class="subtitle">Login to access portal</p>

      <form action="../php/login.php" method="POST">
        <label for="username">Matriculation Number</label>
        <input type="text" id="username" name="matric" placeholder="Enter Matric Number" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>

        <div class="links">
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn">Sign in</button>

        <div class="admin-link">
          <p>Are you an admin? 
            <a href="adminlogin.html">Sign in here</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
